<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #fbf7ef; }
      .frame { fill: #fffdf8; stroke: #1d2430; stroke-width: 3; }
      .wall { fill: #f4ecdf; stroke: #1d2430; stroke-width: 2.4; }
      .soft { fill: #e8dece; stroke: #1d2430; stroke-width: 1.8; }
      .accent { fill: #f8e3d8; stroke: #d0643f; stroke-width: 2; }
      .teal { fill: #dbefe8; stroke: #2a7b74; stroke-width: 2; }
      .glass { fill: rgba(135, 195, 220, 0.18); stroke: #2a7b74; stroke-width: 2; }
      .warning { fill: #fff0c4; stroke: #c09834; stroke-width: 1.8; }
      .label { font: 700 28px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #1d2430; }
      .small { font: 500 20px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #576171; }
      .tiny { font: 500 17px 'PingFang SC', 'Noto Sans SC', sans-serif; fill: #66707e; }
      .capsule { fill: #fff7ef; stroke: #1d2430; stroke-width: 1.8; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980" />
  <rect x="28" y="28" width="1544" height="924" rx="32" class="frame" />

  <text x="92" y="95" class="label">财务室 + 后勤走廊 + 工具柜近景图</text>
  <text x="92" y="128" class="small">把“预算、工具、异常”翻成门、灯、柜子和机柜，而不是一堆监控小字。</text>

  <rect x="110" y="194" width="1382" height="690" rx="30" class="wall" />
  <rect x="182" y="236" width="254" height="500" rx="24" class="soft" />
  <text x="214" y="278" class="label">财务室</text>
  <text x="214" y="310" class="small">预算、额度、工资都从这扇门后面走。</text>
  <rect x="236" y="356" width="136" height="254" rx="16" fill="#f7fbfc" stroke="#2a7b74" stroke-width="2" />
  <circle cx="382" cy="390" r="16" fill="#50a864" stroke="#1d2430" stroke-width="1.5" />
  <text x="214" y="656" class="tiny">状态灯正常是绿，紧张变黄，见底变红。</text>

  <rect x="510" y="280" width="322" height="414" rx="24" class="teal" />
  <text x="544" y="320" class="label">半开工具柜</text>
  <text x="544" y="352" class="small">memory、工具、线缆、硬盘都藏在这里。</text>
  <rect x="558" y="398" width="90" height="54" rx="8" class="soft" />
  <rect x="664" y="398" width="90" height="54" rx="8" class="soft" />
  <rect x="558" y="470" width="90" height="54" rx="8" class="soft" />
  <rect x="664" y="470" width="90" height="54" rx="8" class="soft" />
  <rect x="558" y="542" width="90" height="54" rx="8" class="soft" />
  <rect x="664" y="542" width="90" height="54" rx="8" class="warning" />
  <rect x="766" y="356" width="24" height="260" rx="10" fill="#1d2430" />

  <rect x="922" y="262" width="240" height="450" rx="24" class="glass" />
  <text x="954" y="304" class="label">服务器机柜</text>
  <text x="954" y="336" class="small">系统健康度靠灯色和闪烁节奏说话。</text>
  <rect x="976" y="388" width="132" height="258" rx="16" fill="#13202b" stroke="#1d2430" stroke-width="1.8" />
  <circle cx="1012" cy="430" r="8" fill="#50a864" />
  <circle cx="1040" cy="430" r="8" fill="#f4c34f" />
  <circle cx="1068" cy="430" r="8" fill="#d0643f" />
  <circle cx="1012" cy="470" r="8" fill="#50a864" />
  <circle cx="1040" cy="470" r="8" fill="#50a864" />
  <circle cx="1068" cy="470" r="8" fill="#f4c34f" />
  <rect x="996" y="520" width="92" height="16" rx="6" fill="#364b5c" />
  <rect x="996" y="552" width="92" height="16" rx="6" fill="#364b5c" />
  <rect x="996" y="584" width="92" height="16" rx="6" fill="#364b5c" />

  <rect x="1244" y="286" width="164" height="110" rx="18" class="warning" />
  <text x="1270" y="324" class="label" font-size="22">扫地机器人站</text>
  <circle cx="1324" cy="366" r="22" fill="#f6fafc" stroke="#1d2430" stroke-width="1.6" />

  <rect x="468" y="768" width="980" height="70" rx="18" fill="#f6d870" stroke="#1d2430" stroke-width="1.8" opacity="0.55" />
  <text x="502" y="812" class="small">地面黄线不是装饰。它告诉玩家：这里已经是后勤线，信息会变冷静、功能会更明确。</text>

  <rect x="1210" y="468" width="236" height="172" rx="18" class="capsule" />
  <text x="1238" y="510" class="label" font-size="22">后勤区原则</text>
  <text x="1238" y="544" class="tiny">1. 异常先变成物件状态</text>
  <text x="1238" y="570" class="tiny">2. 少做漂浮面板</text>
  <text x="1238" y="596" class="tiny">3. 财务和工具要分清</text>
</svg>
